<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <title>사전/번역 기록 관리자</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      function loadData() {
        document.getElementById('status').innerText = '로딩 중...';
        
        google.script.run
          .withSuccessHandler(function(logs) {
            document.getElementById('status').innerText = '';
            renderTable(logs);
          })
          .withFailureHandler(function(err) {
            document.getElementById('status').innerText = '오류 발생: ' + err;
          })
          .getLogsFromSheet();
      }

      function deleteRow(rowIndex) {
        if (!confirm('이 기록을 삭제하시겠습니까?')) return;
        
        document.getElementById('status').innerText = '삭제 중...';
        google.script.run
          .withSuccessHandler(function(success) {
            if (success) {
              loadData(); // 다시 로딩
            } else {
              document.getElementById('status').innerText = '삭제 실패';
            }
          })
          .withFailureHandler(function(err) {
            document.getElementById('status').innerText = '오류 발생: ' + err;
          })
          .deleteLogFromSheet(rowIndex);
      }

      function renderTable(logs) {
        const tbody = document.getElementById('logBody');
        tbody.innerHTML = '';
        
        if (!logs || logs.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="py-8 text-center text-gray-500">기록이 없습니다.</td></tr>';
          return;
        }

        logs.forEach(function(log) {
          const typeColor = log.type === '사전' ? 'bg-blue-100 text-blue-800' : 'bg-purple-100 text-purple-800';
          
          const tr = document.createElement('tr');
          tr.className = 'border-b hover:bg-gray-50 transition-colors';
          
          tr.innerHTML = `
            <td class="px-4 py-3 text-sm text-gray-500 whitespace-nowrap">${log.time}</td>
            <td class="px-4 py-3 text-sm">
              <span class="px-2 py-1 rounded-full text-xs font-semibold ${typeColor}">${log.type}</span>
            </td>
            <td class="px-4 py-3 text-sm font-bold text-gray-900">${escapeHtml(log.input)}</td>
            <td class="px-4 py-3 text-sm text-gray-700 whitespace-pre-wrap">${escapeHtml(log.output)}</td>
            <td class="px-4 py-3 text-sm whitespace-nowrap text-right">
              <button onclick="deleteRow(${log.rowIndex})" class="px-3 py-1 bg-red-50 text-red-600 hover:bg-red-100 rounded-md font-medium transition-colors">삭제</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      function escapeHtml(text) {
        if (!text) return '';
        return text.toString().replace(/[&<>"']/g, function(m) {
          switch (m) {
            case '&': return '&amp;';
            case '<': return '&lt;';
            case '>': return '&gt;';
            case '"': return '&quot;';
            case "'": return '&#039;';
          }
        });
      }

      window.onload = loadData;
    </script>
  </head>
  <body class="bg-gray-100 text-gray-800 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <!-- 헤더 -->
      <div class="px-6 py-5 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gray-900">📖 내 단어장 (사전 & 번역 기록)</h1>
        <button onclick="loadData()" class="px-4 py-2 bg-white border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">새로고침</button>
      </div>
      
      <!-- 상태 메시지 -->
      <div id="status" class="px-6 py-3 text-sm font-medium text-blue-600 bg-blue-50 empty:hidden"></div>

      <!-- 리스트 -->
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-white border-b border-gray-200 text-sm font-medium text-gray-500">
              <th class="px-4 py-3">시간</th>
              <th class="px-4 py-3">유형</th>
              <th class="px-4 py-3">입력/단어</th>
              <th class="px-4 py-3">결과/뜻</th>
              <th class="px-4 py-3 text-right">관리</th>
            </tr>
          </thead>
          <tbody id="logBody">
            <!-- 자바스크립트로 렌더링됨 -->
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
